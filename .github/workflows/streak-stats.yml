name: Generate GitHub Streak Stats
on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Readme Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          github_user: Shivansh1146
          options: 'theme=tokyonight&hide_border=true&background=0D1117'
          path: 'streak.svg'

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add streak.svg
          git commit -m "Update GitHub Streak Stats SVG" || exit 0
          git push
